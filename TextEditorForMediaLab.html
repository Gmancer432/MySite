<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor for MediaLab</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Quill text editor documentation: https://quilljs.com/docs/api#content -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <!-- Quill Extension for working with images: https://www.npmjs.com/package/@enzedonline/quill-blot-formatter2#nodejs--commonjs -->
    <script src="https://cdn.jsdelivr.net/npm/@enzedonline/quill-blot-formatter2@3.0/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@enzedonline/quill-blot-formatter2/dist/css/quill-blot-formatter2.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script type="module">
        const { createApp, ref } = Vue;
        Quill.register('modules/blotFormatter2', QuillBlotFormatter2.default);
        const quillOptions = {
            modules: {
                toolbar: {
                    container: [
                        [{ header: [1, 2, false] }],
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }],
                        [{ 'indent': '-1'}, { 'indent': '+1' }], 
                        ['link', 'image'],
                    ],
                    handlers: {
                        image: function (value) {
                            var range = this.quill.getSelection();
                            var index = range.index;
                            const src = prompt('Enter the image URL:');
                            if (src) {
                                this.quill.insertEmbed(index, 'image', src, Quill.sources.USER);
                            }
                        }
                    }
                },
                blotFormatter2: {
                    image: {
                        allowAltTitleEdit: false,
                        linkOptions: {
                            allowLinkEdit: false
                        }
                        
                    }
                }
            },
            theme: 'snow',
        };

        const styleMappings = {

        };
        const dynamicStyleMappings = [
            {
                regex: /^ql-indent-(\d+)$/,
                style: (match) => {
                    return { 'padding-left': `${Number(match[1]) * 3}em`};
                }
            }
        ];

        const vm = createApp({
            data() {
                return {
                    quill: null,
                    HtmlResult: null,
                    copied: false
                }
            },
            methods:{
                ConvertToHtml() {
                    var initialStr = this.quill.getSemanticHTML();
                    const container = document.createElement("div");
                    container.innerHTML = initialStr;

                    container.querySelectorAll("[class]").forEach(element => {
                        [...element.classList].forEach(className => {

                            if (styleMappings[className]) {
                                Object.assign(element.style, styleMappings[className]);
                                element.classList.remove(className);
                                return;
                            }

                            for (const mapping of dynamicStyleMappings) {
                                const match = className.match(mapping.regex);

                                if (match) {
                                    Object.assign(element.style, mapping.style(match));
                                    //Object.assign(element.style, "text-align: 3em;");
                                    element.classList.remove(className);
                                    break;
                                }
                            }

                            if(element.classList.length === 0){
                                element.removeAttribute("class");
                            }
                        });
                    });

                    var postString = container.innerHTML;
                    var spaceRegex = /&nbsp;/g;
                    postString = postString.replace(spaceRegex, " ");

                    this.HtmlResult = postString;
                    this.copied = false;
                },
                CopyHtml() {
                    navigator.clipboard.writeText(this.HtmlResult).then(() => {
                        this.copied = true;
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                    });
                }
            },
            mounted(){
                this.quill = new Quill('#quill-editor', quillOptions);
            }
        }).mount('#vue-app');
        document.vm = vm;
    </script>
</head>
<body>
    <div id="vue-app">
        <div class="container">
            <h1>Editor:</h1>
            <div id="quill-editor" class="mb-2"></div>

            <button class="btn btn-primary me-1" @click="ConvertToHtml">Convert To HTML</button>
            <button class="btn btn-secondary" @click="CopyHtml">Copy HTML</button>
            <span v-if="copied" class="badge bg-success ms-2">Text copied!</span>

            <div v-if="HtmlResult">
                <div style="display:block; border:2px solid gray; margin-top:1em; margin-bottom:1em;"></div>
                <div style="display:block; white-space: pre-wrap;">
                    {{ HtmlResult }}
                </div>
                <div style="display:block; border:2px solid gray; margin-top:1em; margin-bottom:1em;"></div>
                <h1>Preview:</h1>
                <div v-html="HtmlResult" style="white-space: pre-wrap; border:2px solid gray; padding:1em;"></div>
            </div>
        </div>
        
    </div>
</body>
</html>
